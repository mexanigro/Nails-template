<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Evita flash: arranque siempre en light; móvil/tablet permite toggle manual -->
    <script>
      (function () {
        try {
          var root = document.documentElement;
          root.classList.remove("light", "dark");
          root.classList.add("light");
        } catch (e) {}
      })();
    </script>

    <!--
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║  MASTER TEMPLATE — DEFAULT SEO & SOCIAL PREVIEW                               ║
    ║  Static placeholders below. At runtime, `src/hooks/useSEO.ts` overwrites      ║
    ║  title, description, and Open Graph tags from `siteConfig.brand`.            ║
    ╚══════════════════════════════════════════════════════════════════════════════╝
    -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Great+Vibes&family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet" />

    <title>AURA NAIL STUDIO</title>
    <meta
      name="description"
      content="An upscale nail studio offering precision nail artistry, long-lasting gel systems, and bespoke nail design. Every appointment is crafted around your aesthetic."
    />

    <meta property="og:title" content="AURA NAIL STUDIO — Where Every Detail Shines" />
    <meta
      property="og:description"
      content="An upscale nail studio offering precision nail artistry, long-lasting gel systems, and bespoke nail design. Every appointment is crafted around your aesthetic."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AURA NAIL STUDIO — Where Every Detail Shines" />
    <meta
      name="twitter:description"
      content="An upscale nail studio offering precision nail artistry, long-lasting gel systems, and bespoke nail design. Every appointment is crafted around your aesthetic."
    />
    <meta name="twitter:image" content="/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
